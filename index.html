  --reality-head: #313341;
  --park-bg: #2c2e39;
  --park-head: #353745;
  --mound-bg: #303341;
  --mound-head: #393b49;
  --section-head: #44475a;
  --card-name-bg: #23242f;
  --card-detail-bg: #181921;
  --ev-text: #c8ccd4;

* { box-sizing: border-box; margin: 0; padding: 0; }
@font-face {
  font-family: 'Maple Mono';
  src: url('MapleMonoNF-CN.woff2') format('woff2');
  font-display: swap;
}
body {
  font-family: 'Maple Mono', "Microsoft YaHei","PingFang SC",monospace;
  background-color: #1b1c20;
  color: var(--text);
  min-height: 100vh; line-height: 1.7; font-size: 13px;
}
.container {
  display: flex; max-width: 1480px; margin: 0 auto; min-height: 100vh;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(180deg, #25272e, #1b1c20);
  background-size: 18px 18px, 18px 18px, 100% 100%;
  background-attachment: fixed;
}
.main { flex: 1; min-width: 0; padding: 20px 16px 60px; }
.sidebar {
  width: 190px; flex-shrink: 0; position: sticky; top: 0; height: 100vh;
  overflow-y: auto; scrollbar-gutter: stable;
  padding: 12px; background: var(--surface);
  border-left: 1px solid var(--border);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.tl-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.tl-table th.th-reality, .tl-table td.td-reality,
.tl-table th.th-park,   .tl-table td.td-park,
.tl-table th.th-mound,  .tl-table td.td-mound { width: calc((100% - 78px) / 3); }
.tl-table thead { position: sticky; top: 0; z-index: 10; }
.tl-table th {
  padding: 12px 10px; font-size: 12px; font-weight: 700; text-align: center;
  border-bottom: 2px solid var(--border); letter-spacing: 0.5px;
}
.tl-table th.th-reality { background: var(--reality-head); }
.tl-table th.th-park { background: var(--park-head); }
.tl-table th.th-mound { background: var(--mound-head); }
.tl-table th.th-date { background: var(--section-head); width: 78px; min-width: 78px; }
.tl-table td { padding: 10px 12px; vertical-align: top; border-bottom: 1px solid var(--border); }
.tl-table td.td-reality { background: var(--reality-bg); }
.tl-table td.td-park { background: var(--park-bg); }
.tl-table td.td-mound { background: var(--mound-bg); }
.tl-table td.td-date {
  background: var(--surface); width: 78px; text-align: center;
  font-weight: 600; color: var(--muted); white-space: nowrap; font-size: 12px;
}
.section-row td {
  background: var(--section-head); font-weight: 700; font-size: 14px;
  text-align: center; padding: 10px; color: var(--text); letter-spacing: 0.5px;
}
.td-empty { color: var(--muted); font-style: italic; text-align: center; }

.ch-pill {
  display: inline;
  padding: 0 4px;
  border-radius: 2px;
  border-bottom: 1px solid #888;
  background: rgba(255,255,255,0.08);
  color: #ddd;
  font-size: 12px;
  margin: 0 1px;
  line-height: inherit;
  vertical-align: baseline;
  white-space: nowrap;
  pointer-events: none;
  position: relative;
  top: -1px;
}
.ch-pill.real {
  border-bottom-style: dashed;
}

.ev p {
  margin: 0 0 0.35em 0;
  line-height: 1.75;
  color: var(--ev-text);
}
.ev p:last-child { margin-bottom: 0; }

.sidebar-title { font-size: 11px; color: var(--muted); margin-bottom: 12px; text-align: center; }
.sidebar-empty { color: var(--muted); text-align: center; padding: 40px 10px; font-size: 12px; }
.char-card { margin-bottom: 14px; cursor: pointer; }
.char-card-img-wrap {
  border: 3px solid #888;
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  overflow: hidden;
  background-color: #a8a8a8;
  background-image: repeating-linear-gradient(
    135deg,
    rgba(255, 255, 255, 0.25) 0px,
    rgba(255, 255, 255, 0.25) 1px,
    transparent 3px,
    transparent 8px
  );
  background-size: auto;
}
.char-card-img-wrap img { display: block; width: 100%; height: auto; }
.char-card-name-block {
  width: calc(100% - 12px);
  margin: 0 auto;
  border: 2px solid #888;
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
  background: var(--card-name-bg);
  transition: all 0.2s;
}
.char-card-name-basic {
  padding: 5px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  background: #2a2c38;
}
.char-card-name-detail {
  max-height: 0;

  border-top: 0px solid var(--border);
  font-size: 12px;
  line-height: 1.6;
}
.char-card.open .char-card-name-detail {

}
.char-card-name-detail-inner { padding: 10px 12px; background: var(--card-detail-bg); border-radius: 0 0 6px 6px; }
.detail-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.detail-row:last-child { margin-bottom: 0; }
.detail-row img { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
.detail-row span { font-size: 12px; color: var(--text); }
.detail-meta {
  margin-top: 6px; padding-top: 6px;

/* ================================================================
   C 块：textColor + ALIAS + scanText
   ================================================================ */
function textColor(hex) {
  if (typeof hex !== 'string' || !hex.startsWith('#')) return '#000';
  const c = hex.substring(1,7);
  const r = parseInt(c.substring(0,2), 16);
  const g = parseInt(c.substring(2,4), 16);
  const b = parseInt(c.substring(4,6), 16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.6 ? '#000' : '#fff';
}

function getPillBg(d) {
  if (d.color && d.color.startsWith('linear-gradient')) return d.color;
  return d.color || '#888';
}
function getPillColor(d) {
  if (d.forceWhite) return '#fff';
  if (d.color && d.color.startsWith('linear-gradient')) {
    const m = d.color.match(/#[0-9a-fA-F]{6}/);
    return m ? textColor(m[0]) : '#000';
  }
  return textColor(d.color || '#888');
}

const ALIAS = [
  ['大于沐川','yumu','real'], ['大飘飘','piao','real'], ['大小黑','hei','real'],
  ['于沐川','yumu'], ['小孩','kid'], ['闫佳巧','yan'],
  ['小黑','hei'], ['飘飘','piao'], ['草莓','sb'],
  ['闹闹','nao'], ['小野猫','wildcat'], ['主席','stone'],
  ['可可','coco'], ['班长','ban'], ['小北','xiaobei'],
  ['豆子','dou'], ['小花','hua'], ['光头','bal'],
  ['棉发','cotton'], ['松松','song'], ['周周','zhou'],
  ['甜锈','sweet']
];

function scanText(text) {
  const parts = [];
  const keys = new Set();
  let remaining = text;
  let pos = 0;
  while (pos < remaining.length) {
    let matched = null;
    for (const [name, key, variant] of ALIAS) {
      if (remaining.substring(pos).startsWith(name) && (!matched || name.length > matched[0].length)) {
        matched = [name, key, variant];
      }
    }
    if (matched) {
      const [name, key, variant] = matched;
      parts.push(remaining.substring(0, pos));
      const d = charData[key];
      if (d) {
        const bg = getPillBg(d);
        const cls = variant === 'real' ? 'ch-pill real' : 'ch-pill';
        parts.push(`<span class="${cls}" data-char="${key}" style="border-bottom-color:${bg}">${name}</span>`);
        keys.add(key);
      } else {
        parts.push(name);
      }
      remaining = remaining.substring(pos + name.length);
      pos = 0;
    } else {
      pos++;
    }
  }
  parts.push(remaining);
  return { html: parts.join(''), keys: Array.from(keys) };
}

/* ================================================================
   E 块：渲染引擎
   ================================================================ */
const tbody = document.createElement('tbody');
const theadHTML = `<thead><tr><th class="th-date">日期</th><th class="th-reality">🏠 现实世界</th><th class="th-park">🏞️ 蜂山公园 (-1层)</th><th class="th-mound">⏳ 斑丘 (-2层)</th></tr></thead>`;

let rowIdx = 0;
const charInRow = [];

TIMELINE.forEach(period => {
  const sectionRow = document.createElement('tr');
  sectionRow.className = 'section-row';
  sectionRow.innerHTML = `<td colspan="4">${period.period}</td>`;
  tbody.appendChild(sectionRow);

  period.events.forEach(ev => {
    const tr = document.createElement('tr');
    tr.setAttribute('id', 'r' + rowIdx);

    const dateCell = document.createElement('td');
    dateCell.className = 'td-date';
    dateCell.innerHTML = ev.date;
    tr.appendChild(dateCell);

    const rowKeys = new Set();

    ['reality','park','mound'].forEach(col => {
      const td = document.createElement('td');
      td.className = col === 'reality' ? 'td-reality' : col === 'park' ? 'td-park' : 'td-mound';
      const text = ev[col];
      if (!text || text.trim() === '') {
        td.className += ' td-empty';
        td.textContent = '—';
      } else {
        const paras = text.split('\n\n').filter(p => p.trim());
        const parts = paras.map(p => {
          const { html, keys } = scanText(p.trim());
          keys.forEach(k => rowKeys.add(k));
          return '<p><span style="display:inline-block;width:2em"></span>' + html + '</p>';
        });
        td.innerHTML = '<div class="ev">' + parts.join('') + '</div>';
      }
      tr.appendChild(td);
    });

    tr.setAttribute('data-chars', Array.from(rowKeys).join(','));
    charInRow[rowIdx] = rowKeys;
    tbody.appendChild(tr);
    rowIdx++;
  });
});

const tl = document.getElementById('tl');
tl.innerHTML = theadHTML;
tl.appendChild(tbody);

/* ================================================================
   F 块：IntersectionObserver（侧栏动态显示）
   ================================================================ */
const sbCards = document.getElementById('sb-cards');
const sbEmpty = document.getElementById('sb-empty');
const visibleChars = new Map();

function updateSidebar() {
  sbCards.innerHTML = '';
  if (visibleChars.size === 0) {
    sbEmpty.style.display = 'block';
    return;
  }
  sbEmpty.style.display = 'none';
  visibleChars.forEach((count, key) => {
    const d = charData[key];
    if (!d || !d.cardImage || d.cardImage === CardImages.NOBODY || d.cardImage === CardImages.NOHANI) return;
    const card = document.createElement('div');
    card.className = 'char-card';
    card.setAttribute('data-char', key);
    const border = getPillBg(d);
    card.innerHTML = `<div class="char-card-img-wrap" style="border-color:${border}">
      <img src="${d.cardImage}" alt="${d.nickname}" loading="lazy">
    </div>
    <div class="char-card-name-block" style="border-color:${border}">
      <div class="char-card-name-basic">${d.nickname}</div>
      <div class="char-card-name-detail">
        <div class="char-card-name-detail-inner">
          <div class="detail-row">${d.societyLogo?`<img src="${d.societyLogo}" alt="">`:''}<span>${d.society||'—'}</span></div>
          <div class="detail-row">${d.schoolLogo?`<img src="${d.schoolLogo}" alt="">`:''}<span>${d.school||'—'}</span></div>
          <div class="detail-meta">本名：${d.real||'—'}　${d.gender}　${d.age}岁</div>
        </div>
      </div></div>`;
    card.onclick = function() { toggleCard(card); };
    sbCards.appendChild(card);
  });
}

function toggleCard(card) {
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.char-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const idx = parseInt(entry.target.getAttribute('id').substring(1));
    const keys = charInRow[idx];
    if (!keys) return;
    if (entry.isIntersecting) {
      keys.forEach(k => visibleChars.set(k, (visibleChars.get(k) || 0) + 1));
    } else {
      keys.forEach(k => {
        const c = visibleChars.get(k);
        if (c === 1) visibleChars.delete(k);
        else if (c > 1) visibleChars.set(k, c - 1);
      });
    }
    updateSidebar();
  });
}, { threshold: 0.1 });

document.querySelectorAll('.tl-table tbody tr[id]').forEach(tr => observer.observe(tr));

/* ================================================================
   G 块：pill点击联动侧栏
   ================================================================ */
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('ch-pill')) {
    const key = e.target.getAttribute('data-char');
    if (!key) return;
    const card = document.querySelector(`.char-card[data-char="${key}"]`);
    if (card) {
      document.querySelectorAll('.char-card.open').forEach(c => c.classList.remove('open'));
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
});
</script>
